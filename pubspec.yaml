name: ghar_bazaar
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.0
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  uuid: ^4.5.3
  google_fonts: ^8.0.2
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  collection: ^1.19.1
  google_sign_in: ^7.2.0
  http: ^1.6.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/ghar_bazaar_logo.png"
  remove_alpha_ios: true
flutter:
  uses-material-design: true
